 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book library</title>
    <style>
        body{
            background-color: #f8f8f8;
            font-family: Arial,  sans-serif;
        }
        .book-library{
            background-color: #ffffff;
            padding: 20px;
            width: 300px;
            margin: auto;
        }
        .book{
            background-color: #f1f1f1;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .book img{
            width: 150px;
            height: auto;
        }
        .author{
            color: #777777;
            font-size: 14px;
        }
        .price{
            background-color: #2ecc71;
            color: white;
            padding: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="book-library">
        <div class="book">
        <img src="https://images-na.ssl-images-amazon.com/images/I/81WojUxbbFL.jpg" alt="Spy in the Amber">
        <h2>Spy in the Amber</h2>
        <p class="author">by Vikram Chandra</p>
        <p class="price">Rs. 599</p>
    </div>
    <div class="book">
        <img src="https://images-na.ssl-images-amazon.com/images/I/81l3rZK4lnL.jpg" alt="Sacred Games">
        <h2>Sacred Games</h2>
        <p class="author"> by Manjiri Prabhu</p>
        <p class="price">Rs. 399</p>
    </div>
    <div class="book">
        <img src="https://images-na.ssl-images-amazon.com/images/I/71g2ednj0JL.jpg" alt="Byomkesh Bakshi">
        <h2>Byomkesh Bakshi</h2>
        <p class="author">by Saradindu Bandyopadhyay</p>
        <p class="price">Rs. 299</p>
    </div>
</body>
</html>
